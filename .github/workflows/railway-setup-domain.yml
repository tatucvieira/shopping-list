name: Setup Railway Domain

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup via Railway GraphQL API
        run: |
          API="https://backboard.railway.app/graphql/v2"
          TOKEN="$RAILWAY_TOKEN"
          REPORT=""

          gql() {
            curl -s -X POST "$API" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"$1\"}"
          }

          # Step 1: Check existing projects
          echo "=== Checking projects ==="
          PROJECTS=$(gql "{ projects { edges { node { id name services { edges { node { id name } } } } } } }")
          echo "$PROJECTS"
          REPORT="## Existing Projects\n\`\`\`json\n$PROJECTS\n\`\`\`\n\n"

          # Step 2: Create project
          echo "=== Creating project ==="
          CREATE=$(gql "mutation { projectCreate(input: { name: \\\"shopping-list\\\" }) { id name } }")
          echo "$CREATE"
          PROJECT_ID=$(echo "$CREATE" | jq -r '.data.projectCreate.id // empty')
          REPORT="$REPORT## Create Project\n\`\`\`json\n$CREATE\n\`\`\`\nProject ID: $PROJECT_ID\n\n"

          if [ -z "$PROJECT_ID" ]; then
            echo "Failed to create project"
            REPORT="$REPORT## ERROR: Could not create project\n"
            echo -e "$REPORT" > /tmp/report.txt
            exit 0
          fi

          # Step 3: Get default environment ID
          echo "=== Getting environment ==="
          ENV=$(gql "{ project(id: \\\"$PROJECT_ID\\\") { environments { edges { node { id name } } } } }")
          echo "$ENV"
          ENV_ID=$(echo "$ENV" | jq -r '.data.project.environments.edges[0].node.id // empty')
          REPORT="$REPORT## Environment\n\`\`\`json\n$ENV\n\`\`\`\nEnv ID: $ENV_ID\n\n"

          # Step 4: Create service with GitHub repo
          echo "=== Creating service ==="
          SERVICE=$(gql "mutation { serviceCreate(input: { name: \\\"web\\\", projectId: \\\"$PROJECT_ID\\\", source: { repo: \\\"tatucvieira/shopping-list\\\" } }) { id name } }")
          echo "$SERVICE"
          SERVICE_ID=$(echo "$SERVICE" | jq -r '.data.serviceCreate.id // empty')
          REPORT="$REPORT## Create Service\n\`\`\`json\n$SERVICE\n\`\`\`\nService ID: $SERVICE_ID\n\n"

          if [ -z "$SERVICE_ID" ]; then
            echo "Failed to create service"
            echo -e "$REPORT" > /tmp/report.txt
            exit 0
          fi

          # Step 5: Set root directory to shopping-list
          echo "=== Setting variables ==="
          VARS=$(gql "mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", name: \\\"RAILWAY_ROOT_DIRECTORY\\\", value: \\\"shopping-list\\\" }) }")
          echo "$VARS"

          # Set PORT
          PORT_VAR=$(gql "mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", name: \\\"PORT\\\", value: \\\"8080\\\" }) }")
          echo "$PORT_VAR"
          REPORT="$REPORT## Variables\n\`\`\`json\nRoot dir: $VARS\nPort: $PORT_VAR\n\`\`\`\n\n"

          # Step 6: Generate domain
          echo "=== Generating domain ==="
          DOMAIN=$(gql "mutation { serviceDomainCreate(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { domain } }")
          echo "$DOMAIN"
          DOMAIN_URL=$(echo "$DOMAIN" | jq -r '.data.serviceDomainCreate.domain // empty')
          REPORT="$REPORT## Domain\n\`\`\`json\n$DOMAIN\n\`\`\`\n\n**URL: https://$DOMAIN_URL**\n"

          echo -e "$REPORT" > /tmp/report.txt
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Report results
        if: always()
        run: |
          REPORT=$(cat /tmp/report.txt 2>/dev/null || echo "No report generated")
          gh issue create \
            --title "Railway Deploy Result - $(date -u +%H:%M)" \
            --body "$REPORT" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
