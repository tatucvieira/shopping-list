name: Setup Railway Domain

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Create project, deploy, and generate domain
        run: |
          set +e
          REPORT=""

          # Step 1: Init a new project
          echo "=== Creating project ==="
          railway init 2>&1 | tee /tmp/init.txt
          REPORT="$REPORT## Init\n\`\`\`\n$(cat /tmp/init.txt)\n\`\`\`\n\n"

          # Step 2: Link and check status
          echo "=== Status ==="
          railway status 2>&1 | tee /tmp/status.txt
          REPORT="$REPORT## Status\n\`\`\`\n$(cat /tmp/status.txt)\n\`\`\`\n\n"

          # Step 3: Deploy from shopping-list directory
          echo "=== Deploying ==="
          cd shopping-list
          railway up --detach 2>&1 | tee /tmp/deploy.txt
          DEPLOY_EXIT=$?
          cd ..
          REPORT="$REPORT## Deploy (exit=$DEPLOY_EXIT)\n\`\`\`\n$(cat /tmp/deploy.txt)\n\`\`\`\n\n"

          # Step 4: Generate domain
          echo "=== Generating domain ==="
          railway domain 2>&1 | tee /tmp/domain.txt
          REPORT="$REPORT## Domain\n\`\`\`\n$(cat /tmp/domain.txt)\n\`\`\`\n\n"

          # Step 5: Final status
          echo "=== Final status ==="
          railway status 2>&1 | tee /tmp/final.txt
          REPORT="$REPORT## Final Status\n\`\`\`\n$(cat /tmp/final.txt)\n\`\`\`"

          echo -e "$REPORT" > /tmp/report.txt
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Report results
        if: always()
        run: |
          REPORT=$(cat /tmp/report.txt 2>/dev/null || echo "No report generated")
          gh issue create \
            --title "Railway Deploy Result - $(date -u +%H:%M)" \
            --body "$REPORT" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
