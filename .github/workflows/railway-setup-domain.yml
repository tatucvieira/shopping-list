name: Setup Railway Domain

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Test token and list projects
        id: test
        run: |
          echo "=== Testing Railway API token ==="

          # Test token by listing projects
          PROJECTS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ me { id email } }"}')
          echo "Me: $PROJECTS"

          PROJECT_LIST=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ projects { edges { node { id name services { edges { node { id name } } } } } } }"}')
          echo "Projects: $PROJECT_LIST"

          # Save for issue
          echo "$PROJECTS" > /tmp/me.txt
          echo "$PROJECT_LIST" > /tmp/projects.txt
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Report results
        if: always()
        run: |
          ME=$(cat /tmp/me.txt 2>/dev/null || echo "N/A")
          PROJECTS=$(cat /tmp/projects.txt 2>/dev/null || echo "N/A")

          gh issue create \
            --title "Railway API Test - $(date -u +%H:%M)" \
            --body "$(cat <<BODY
          ## Token Test (me query)
          \`\`\`json
          ${ME}
          \`\`\`

          ## Projects
          \`\`\`json
          ${PROJECTS}
          \`\`\`
          BODY
          )" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
